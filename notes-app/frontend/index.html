<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes app</title>
</head>

<body>
    <div style="display:flex;justify-content: space-between; padding: 10px 100px">
        <div id="notes-container">Loading...</div>

        <div>
            <input id="note-input" type="text" placeholder="Enter a note">
            <button onclick="addNote()">Create new note</button>
        </div>
    </div>

    <script>


        async function fetchNotes() {
            const res = await fetch("http://localhost:3000/notes");
            const data = await res.json();

            const container = document.getElementById("notes-container");
            container.innerHTML = "";

            data.forEach(note => {
                const div = document.createElement("div");
                div.innerText = note;
                container.appendChild(div);
            });
        }

        async function addNote() {
            const input = document.getElementById("note-input");
            const noteText = input.value;

            if (!noteText) return;

            await fetch("http://localhost:3000/notes", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ note: noteText })
            });

            input.value = "";
            fetchNotes();
        }

        fetchNotes();
    </script>
</body>

</html>
